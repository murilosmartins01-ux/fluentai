<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FluentAI — Aprenda Inglês com IA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0F; font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLORS = {
      bg: "#0A0A0F", surface: "#12121A", surfaceLight: "#1A1A28",
      border: "#2A2A3D", accent: "#6C63FF", accentLight: "#8B85FF",
      accentGlow: "rgba(108,99,255,0.15)", gold: "#F5C542", green: "#22D3A0",
      coral: "#FF6B6B", blue: "#4FACFE", text: "#F0EFF8",
      textMuted: "#8884A8", textFaint: "#4A4868",
    };

    const lessons = [
      { id: 1, title: "Greetings & Introductions", phase: "Foundation", icon: "👋", xp: 50, duration: "5 min", completed: true, locked: false },
      { id: 2, title: "Numbers & Time", phase: "Foundation", icon: "🕐", xp: 50, duration: "5 min", completed: true, locked: false },
      { id: 3, title: "Everyday Objects", phase: "Foundation", icon: "🏠", xp: 75, duration: "8 min", completed: false, locked: false, current: true },
      { id: 4, title: "Simple Present Tense", phase: "Foundation", icon: "⚡", xp: 75, duration: "8 min", completed: false, locked: true },
      { id: 5, title: "Daily Routines", phase: "Communication", icon: "☀️", xp: 100, duration: "10 min", completed: false, locked: true },
      { id: 6, title: "Travel & Transport", phase: "Communication", icon: "✈️", xp: 100, duration: "10 min", completed: false, locked: true },
    ];

    const achievements = [
      { id: 1, title: "First Step", desc: "Complete your first lesson", icon: "🌱", earned: true },
      { id: 2, title: "On Fire", desc: "7-day streak", icon: "🔥", earned: true },
      { id: 3, title: "Chatterbox", desc: "10 speaking sessions", icon: "🎙️", earned: false },
      { id: 4, title: "Wordsmith", desc: "Learn 100 words", icon: "📚", earned: false },
    ];

    const rankingData = [
      { rank: 1, name: "Ana Lima", xp: 4820, avatar: "AL" },
      { rank: 2, name: "Carlos M.", xp: 4210, avatar: "CM" },
      { rank: 3, name: "João P.", xp: 3990, avatar: "JP" },
      { rank: 4, name: "Você", xp: 3740, avatar: "EU", isUser: true },
      { rank: 5, name: "Maria S.", xp: 3500, avatar: "MS" },
    ];

    const vocabCards = [
      { word: "Schedule", sentence: "I need to check my schedule for tomorrow.", translation: "Agenda / Cronograma", emoji: "📅" },
      { word: "Opportunity", sentence: "This is a great opportunity to improve.", translation: "Oportunidade", emoji: "🚀" },
      { word: "Challenge", sentence: "Every challenge makes you stronger.", translation: "Desafio", emoji: "💪" },
    ];

    const shadowingPhrases = [
      { text: "I usually wake up at seven in the morning.", phonetic: "aɪ ˈjuːʒuəli weɪk ʌp æt ˈsevən ɪn ðə ˈmɔːrnɪŋ" },
      { text: "Could you help me find the nearest station?", phonetic: "kʊd juː help miː faɪnd ðə ˈnɪərɪst ˈsteɪʃən" },
    ];

    const lessonQuestions = [
      { question: "Complete: 'I ___ a cup of coffee every morning.'", options: ["have", "has", "am", "is"], correct: 0, explanation: "Com 'I', usamos sempre 'have' — não 'has'. 'Has' é para he/she/it." },
      { question: "Which sentence sounds most natural?", options: ["I drink every day coffee.", "I drink coffee every day.", "Every day I coffee drink.", "Coffee I drink every day."], correct: 1, explanation: "Em inglês, 'every day' vem no final da frase." },
      { question: "What does 'schedule' mean?", options: ["Horário / Agenda", "Trabalho", "Reunião", "Plano secreto"], correct: 0, explanation: "'Schedule' significa agenda ou horário — um plano de como você vai usar seu tempo." },
    ];

    function XPBar({ current, max, color = COLORS.accent }) {
      return (
        <div style={{ height: 6, borderRadius: 10, background: COLORS.border, overflow: "hidden", marginTop: 6 }}>
          <div style={{ height: "100%", width: `${Math.min((current / max) * 100, 100)}%`, background: `linear-gradient(90deg, ${color}, ${color}BB)`, borderRadius: 10, transition: "width 0.6s ease" }} />
        </div>
      );
    }

    function Pill({ children, color = COLORS.accent }) {
      return <span style={{ display: "inline-block", padding: "4px 12px", borderRadius: 50, fontSize: 11, fontWeight: 600, background: color + "22", color, letterSpacing: 0.5 }}>{children}</span>;
    }

    function FluentAI() {
      const [screen, setScreen] = useState("home");
      const [xp, setXp] = useState(3740);
      const [streak] = useState(7);
      const [level] = useState(12);
      const [chatInput, setChatInput] = useState("");
      const [messages, setMessages] = useState([{ role: "ai", text: "Hey! I'm Aria, your English coach 🤖. Let's practice! How was your morning?" }]);
      const [isLoading, setIsLoading] = useState(false);
      const [currentVocab, setCurrentVocab] = useState(0);
      const [cardFlipped, setCardFlipped] = useState(false);
      const [shadowingActive, setShadowingActive] = useState(false);
      const [lessonStep, setLessonStep] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => { chatEndRef.current && chatEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const S = {
        container: { background: COLORS.bg, minHeight: "100vh", color: COLORS.text, maxWidth: 430, margin: "0 auto", position: "relative" },
        header: { padding: "16px 20px 12px", background: COLORS.bg, position: "sticky", top: 0, zIndex: 100, borderBottom: `1px solid ${COLORS.border}` },
        card: { background: COLORS.surface, borderRadius: 20, border: `1px solid ${COLORS.border}`, padding: "20px", marginBottom: 16 },
        scroll: { overflowY: "auto", padding: "16px 20px 100px" },
        btn: (v = "primary") => ({ width: "100%", padding: "16px", borderRadius: 16, border: v === "ghost" ? `1px solid ${COLORS.border}` : "none", fontSize: 16, fontWeight: 700, cursor: "pointer", background: v === "primary" ? COLORS.accent : v === "ghost" ? "transparent" : COLORS.surface, color: v === "primary" ? "#fff" : COLORS.textMuted, transition: "all 0.2s" }),
        tab: (active) => ({ flex: 1, padding: "10px 4px", background: active ? COLORS.accent : "transparent", border: "none", borderRadius: 12, color: active ? "#fff" : COLORS.textMuted, fontSize: 11, fontWeight: active ? 600 : 400, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }),
      };

      const BottomNav = () => (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: COLORS.bg, borderTop: `1px solid ${COLORS.border}`, padding: "8px 12px 16px", display: "flex", gap: 4, zIndex: 200 }}>
          {[["home","🏠","Home"],["lessons","📚","Lições"],["chat","🤖","IA Chat"],["vocab","🃏","Vocab"],["ranking","🏆","Ranking"]].map(([id, icon, label]) => (
            <button key={id} style={S.tab(screen === id)} onClick={() => setScreen(id)}>
              <span style={{ fontSize: 19 }}>{icon}</span>
              <span>{label}</span>
            </button>
          ))}
        </div>
      );

      const sendChat = async () => {
        if (!chatInput.trim() || isLoading) return;
        const userMsg = chatInput.trim();
        setChatInput("");
        setMessages(prev => [...prev, { role: "user", text: userMsg }]);
        setIsLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: "You are Aria, a friendly English coach inside FluentAI app. The user is Brazilian. Always respond in English (2-3 sentences max). Gently correct grammar errors. End with a follow-up question. Use emojis occasionally.",
              messages: messages.filter(m => m.role !== "system").map(m => ({ role: m.role === "ai" ? "assistant" : "user", content: m.text })).concat([{ role: "user", content: userMsg }])
            })
          });
          const data = await res.json();
          setMessages(prev => [...prev, { role: "ai", text: data.content?.[0]?.text || "Great! Keep going! 🎉" }]);
        } catch {
          setMessages(prev => [...prev, { role: "ai", text: "Let's try again! What were you saying? 😊" }]);
        }
        setIsLoading(false);
      };

      // HOME
      if (screen === "home") return (
        <div style={S.container}>
          <div style={S.header}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <p style={{ fontSize: 13, color: COLORS.textMuted, margin: 0 }}>Bem-vindo de volta 👋</p>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "2px 0 0", letterSpacing: -0.5 }}>FluentAI</h2>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, background: COLORS.surface, padding: "8px 14px", borderRadius: 50, border: `1px solid ${COLORS.border}` }}>
                  <span>🔥</span><span style={{ fontWeight: 700, color: COLORS.gold }}>{streak}</span>
                </div>
                <div style={{ width: 42, height: 42, borderRadius: "50%", background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>😎</div>
              </div>
            </div>
          </div>
          <div style={S.scroll}>
            <div style={{ background: `linear-gradient(135deg, ${COLORS.accent}22, ${COLORS.accentGlow})`, borderRadius: 20, border: `1px solid ${COLORS.accent}44`, padding: 20, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div>
                  <p style={{ fontSize: 12, color: COLORS.accentLight, margin: 0, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>Nível {level}</p>
                  <h3 style={{ fontSize: 20, fontWeight: 800, margin: "4px 0 0" }}>Intermediate Explorer</h3>
                </div>
                <div style={{ textAlign: "right" }}>
                  <p style={{ fontSize: 12, color: COLORS.textMuted, margin: 0 }}>XP Total</p>
                  <p style={{ fontSize: 22, fontWeight: 800, color: COLORS.gold, margin: 0 }}>{xp.toLocaleString()}</p>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: COLORS.textMuted, marginBottom: 6 }}>
                <span>{xp.toLocaleString()} XP</span>
                <span>{(4000 - xp).toLocaleString()} para próximo nível</span>
              </div>
              <XPBar current={xp} max={4000} />
            </div>

            <div style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>Meta de hoje</h3>
                <Pill color={COLORS.green}>2/3 completas</Pill>
              </div>
              {[["Completar 1 lição", true, 50], ["Praticar speaking", true, 75], ["Revisar vocabulário", false, 25]].map(([label, done, xpv], i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < 2 ? `1px solid ${COLORS.border}` : "none" }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: done ? COLORS.green + "22" : COLORS.surfaceLight, border: `2px solid ${done ? COLORS.green : COLORS.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: COLORS.green, fontWeight: 700 }}>{done ? "✓" : ""}</div>
                  <span style={{ flex: 1, fontSize: 14, color: done ? COLORS.textMuted : COLORS.text, textDecoration: done ? "line-through" : "none" }}>{label}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.gold }}>+{xpv} XP</span>
                </div>
              ))}
            </div>

            <div style={S.card}>
              <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 14px" }}>Continuar aprendendo</h3>
              <div style={{ background: COLORS.surfaceLight, borderRadius: 16, padding: 16, border: `1px solid ${COLORS.accent}33`, marginBottom: 14 }}>
                <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                  <div style={{ width: 52, height: 52, borderRadius: 16, background: COLORS.accent + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>🏠</div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 11, color: COLORS.accent, fontWeight: 600, margin: "0 0 3px", textTransform: "uppercase", letterSpacing: 0.5 }}>Foundation · Lição 3</p>
                    <p style={{ fontSize: 16, fontWeight: 700, margin: "0 0 8px" }}>Everyday Objects</p>
                    <div style={{ display: "flex", gap: 8 }}><Pill color={COLORS.blue}>8 min</Pill><Pill color={COLORS.gold}>+75 XP</Pill></div>
                  </div>
                </div>
              </div>
              <button style={S.btn()} onClick={() => setScreen("lesson")}>▶  Continuar lição</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              {[[streak,"🔥","Dias seguidos",COLORS.coral],[284,"📝","Palavras aprendidas",COLORS.blue],[23,"⏱️","Minutos hoje",COLORS.green],["91%","🎯","Precisão",COLORS.gold]].map(([value, icon, label, color], i) => (
                <div key={i} style={{ background: COLORS.surface, borderRadius: 18, border: `1px solid ${COLORS.border}`, padding: 16 }}>
                  <div style={{ fontSize: 24, marginBottom: 8 }}>{icon}</div>
                  <p style={{ fontSize: 22, fontWeight: 800, color, margin: "0 0 3px" }}>{value}</p>
                  <p style={{ fontSize: 12, color: COLORS.textMuted, margin: 0 }}>{label}</p>
                </div>
              ))}
            </div>

            <div style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>Conquistas recentes</h3>
                <span style={{ fontSize: 12, color: COLORS.accent, cursor: "pointer" }}>Ver todas</span>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                {achievements.map(a => (
                  <div key={a.id} style={{ flex: 1, background: COLORS.surfaceLight, borderRadius: 14, padding: "12px 8px", textAlign: "center", border: `1px solid ${a.earned ? COLORS.gold + "44" : COLORS.border}`, opacity: a.earned ? 1 : 0.5 }}>
                    <div style={{ fontSize: 26, marginBottom: 4 }}>{a.icon}</div>
                    <p style={{ fontSize: 10, fontWeight: 600, color: a.earned ? COLORS.gold : COLORS.textFaint, margin: 0 }}>{a.title}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <BottomNav />
        </div>
      );

      // LESSONS
      if (screen === "lessons") return (
        <div style={S.container}>
          <div style={S.header}>
            <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>Trilha de Aprendizado</h2>
            <p style={{ fontSize: 13, color: COLORS.textMuted, margin: "4px 0 0" }}>Seu caminho para a fluência</p>
          </div>
          <div style={S.scroll}>
            {["Foundation","Communication","Fluency","Advanced Mind"].map((phase, pi) => (
              <div key={phase} style={{ marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: [COLORS.green,COLORS.blue,COLORS.accent,COLORS.gold][pi] }} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: [COLORS.green,COLORS.blue,COLORS.accent,COLORS.gold][pi], textTransform: "uppercase", letterSpacing: 1 }}>Fase {pi+1}: {phase}</span>
                </div>
                {lessons.filter(l => l.phase === phase).map(lesson => (
                  <div key={lesson.id} onClick={() => !lesson.locked && setScreen("lesson")}
                    style={{ background: lesson.current ? COLORS.accent + "11" : COLORS.surface, borderRadius: 20, border: `1px solid ${lesson.current ? COLORS.accent + "88" : COLORS.border}`, padding: 20, marginBottom: 10, opacity: lesson.locked ? 0.5 : 1, cursor: lesson.locked ? "not-allowed" : "pointer" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ width: 50, height: 50, borderRadius: 15, background: lesson.completed ? COLORS.green + "22" : lesson.current ? COLORS.accent + "22" : COLORS.surfaceLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, border: `2px solid ${lesson.completed ? COLORS.green : lesson.current ? COLORS.accent : COLORS.border}` }}>
                        {lesson.completed ? "✅" : lesson.locked ? "🔒" : lesson.icon}
                      </div>
                      <div style={{ flex: 1 }}>
                        <p style={{ fontSize: 15, fontWeight: 700, margin: "0 0 5px" }}>{lesson.title}</p>
                        <div style={{ display: "flex", gap: 8 }}>
                          <Pill color={lesson.completed ? COLORS.green : COLORS.textMuted}>{lesson.completed ? "Completa" : lesson.current ? "Em andamento" : lesson.duration}</Pill>
                          <Pill color={COLORS.gold}>+{lesson.xp} XP</Pill>
                        </div>
                      </div>
                      {!lesson.locked && <span style={{ color: COLORS.textMuted, fontSize: 20 }}>›</span>}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
          <BottomNav />
        </div>
      );

      // CHAT
      if (screen === "chat") return (
        <div style={S.container}>
          <div style={S.header}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🤖</div>
              <div>
                <h3 style={{ fontSize: 17, fontWeight: 700, margin: 0 }}>Aria — English Coach</h3>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.green }} />
                  <span style={{ fontSize: 12, color: COLORS.textMuted }}>Always online</span>
                </div>
              </div>
            </div>
          </div>
          <div style={{ ...S.scroll, paddingBottom: 130, height: "calc(100vh - 160px)", overflowY: "auto" }}>
            <div style={{ background: COLORS.surface, borderRadius: 14, padding: "12px 16px", marginBottom: 20, border: `1px solid ${COLORS.border}`, textAlign: "center" }}>
              <p style={{ fontSize: 13, color: COLORS.textMuted, margin: 0 }}>💡 Fale em inglês! Aria vai corrigir suavemente seus erros.</p>
            </div>
            {messages.map((msg, i) => (
              <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 14 }}>
                {msg.role === "ai" && <div style={{ width: 32, height: 32, borderRadius: 10, background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, marginRight: 10, flexShrink: 0, alignSelf: "flex-end" }}>🤖</div>}
                <div style={{ maxWidth: "78%", padding: "12px 16px", borderRadius: msg.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px", background: msg.role === "user" ? COLORS.accent : COLORS.surface, fontSize: 15, lineHeight: 1.6, border: msg.role === "ai" ? `1px solid ${COLORS.border}` : "none" }}>
                  {msg.text}
                </div>
              </div>
            ))}
            {isLoading && (
              <div style={{ display: "flex", alignItems: "flex-end", gap: 10, marginBottom: 14 }}>
                <div style={{ width: 32, height: 32, borderRadius: 10, background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🤖</div>
                <div style={{ padding: "14px 18px", borderRadius: "18px 18px 18px 4px", background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
                  <div style={{ display: "flex", gap: 5 }}>
                    {[0,1,2].map(j => <div key={j} style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.accent, animation: `bounce 1.2s ${j*0.2}s infinite` }} />)}
                  </div>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: COLORS.bg, borderTop: `1px solid ${COLORS.border}`, padding: "12px 16px 20px" }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 10, overflowX: "auto" }}>
              {["How was your day?", "I need help with...", "Can we practice..."].map((s, i) => (
                <button key={i} onClick={() => setChatInput(s)} style={{ fontSize: 12, padding: "6px 12px", borderRadius: 50, background: COLORS.surface, border: `1px solid ${COLORS.border}`, color: COLORS.textMuted, cursor: "pointer", whiteSpace: "nowrap" }}>{s}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChat()} placeholder="Type in English..." style={{ flex: 1, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 16, padding: "14px 18px", fontSize: 15, color: COLORS.text, outline: "none" }} />
              <button onClick={sendChat} disabled={isLoading} style={{ width: 52, height: 52, borderRadius: 16, background: COLORS.accent, border: "none", fontSize: 22, cursor: "pointer" }}>↑</button>
            </div>
          </div>
        </div>
      );

      // VOCAB
      if (screen === "vocab") return (
        <div style={S.container}>
          <div style={S.header}>
            <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>Vocabulário Contextual</h2>
            <p style={{ fontSize: 13, color: COLORS.textMuted, margin: "4px 0 0" }}>Aprenda palavras em contexto real</p>
          </div>
          <div style={S.scroll}>
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 14 }}>Card {currentVocab+1} de {vocabCards.length} · Toque para revelar</p>
              <div onClick={() => setCardFlipped(!cardFlipped)} style={{ background: cardFlipped ? COLORS.accent + "22" : COLORS.surface, borderRadius: 24, border: `1px solid ${cardFlipped ? COLORS.accent : COLORS.border}`, padding: "40px 24px", cursor: "pointer", minHeight: 200, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
                <span style={{ fontSize: 48 }}>{vocabCards[currentVocab].emoji}</span>
                <h2 style={{ fontSize: 32, fontWeight: 900, margin: 0, color: cardFlipped ? COLORS.accentLight : COLORS.text }}>{vocabCards[currentVocab].word}</h2>
                {cardFlipped ? (
                  <>
                    <p style={{ fontSize: 16, color: COLORS.text, fontStyle: "italic", margin: "8px 0 0", lineHeight: 1.6, textAlign: "center" }}>"{vocabCards[currentVocab].sentence}"</p>
                    <div style={{ background: COLORS.surface, borderRadius: 12, padding: "10px 20px", marginTop: 8 }}>
                      <p style={{ fontSize: 14, color: COLORS.gold, margin: 0, fontWeight: 600 }}>{vocabCards[currentVocab].translation}</p>
                    </div>
                  </>
                ) : <p style={{ fontSize: 14, color: COLORS.textMuted, margin: 0 }}>Toque para ver no contexto</p>}
              </div>
              {cardFlipped && (
                <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
                  <button onClick={() => { setCardFlipped(false); setCurrentVocab(v => Math.max(0, v-1)); }} style={{ ...S.btn("ghost"), flex: 1 }}>👎 Difícil</button>
                  <button onClick={() => { setCardFlipped(false); setCurrentVocab(v => (v+1) % vocabCards.length); }} style={{ ...S.btn(), flex: 1 }}>👍 Fácil</button>
                </div>
              )}
            </div>

            <div style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div><h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 3px" }}>🎙️ Shadowing</h3><p style={{ fontSize: 13, color: COLORS.textMuted, margin: 0 }}>Repita e grave sua pronúncia</p></div>
                <Pill color={COLORS.coral}>PRO</Pill>
              </div>
              <div style={{ background: COLORS.surfaceLight, borderRadius: 14, padding: 16, marginBottom: 14, border: `1px solid ${COLORS.border}` }}>
                <p style={{ fontSize: 16, fontWeight: 600, margin: "0 0 8px", lineHeight: 1.5 }}>"{shadowingPhrases[0].text}"</p>
                <p style={{ fontSize: 12, color: COLORS.accent, margin: 0, fontFamily: "monospace" }}>{shadowingPhrases[0].phonetic}</p>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button style={{ ...S.btn("ghost"), flex: 1 }} onClick={() => setShadowingActive(!shadowingActive)}>{shadowingActive ? "⏹ Parar" : "▶ Ouvir"}</button>
                <button style={{ ...S.btn(), flex: 1, background: shadowingActive ? COLORS.coral : COLORS.accent }}>🎙️ {shadowingActive ? "Gravando..." : "Gravar"}</button>
              </div>
            </div>

            <div style={S.card}>
              <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 14px" }}>⏰ Revisão Espaçada</h3>
              {[["Para revisar hoje", 12, COLORS.coral],["Revisados ontem", 8, COLORS.green],["Próximas (3 dias)", 23, COLORS.blue]].map(([label, count, color], i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < 2 ? `1px solid ${COLORS.border}` : "none" }}>
                  <span style={{ fontSize: 14 }}>{label}</span>
                  <span style={{ fontWeight: 700, color, fontSize: 16 }}>{count}</span>
                </div>
              ))}
              <button style={{ ...S.btn(), marginTop: 14 }}>Revisar agora (12)</button>
            </div>
          </div>
          <BottomNav />
        </div>
      );

      // RANKING
      if (screen === "ranking") return (
        <div style={S.container}>
          <div style={S.header}>
            <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>🏆 Ranking Semanal</h2>
            <p style={{ fontSize: 13, color: COLORS.textMuted, margin: "4px 0 0" }}>Semana 21 · Reinicia em 3 dias</p>
          </div>
          <div style={S.scroll}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "center", gap: 12, marginBottom: 28, padding: "20px 0" }}>
              {[rankingData[1], rankingData[0], rankingData[2]].map((user, i) => (
                <div key={user.rank} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 50, height: 50, borderRadius: "50%", background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 16, border: `3px solid ${["#C0C0C0","#FFD700","#CD7F32"][i]}` }}>{user.avatar}</div>
                  <p style={{ fontSize: 12, fontWeight: 600, margin: 0 }}>{user.name}</p>
                  <div style={{ width: 80, height: [140,170,120][i], background: COLORS.surface, borderRadius: "12px 12px 0 0", border: `1px solid ${COLORS.border}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
                    <span style={{ fontSize: 22 }}>{["🥈","🥇","🥉"][i]}</span>
                    <span style={{ fontSize: 11, color: COLORS.textMuted }}>{user.xp.toLocaleString()}</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={S.card}>
              {rankingData.map((user, i) => (
                <div key={user.rank} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px", marginBottom: 4, background: user.isUser ? COLORS.accent + "11" : "transparent", borderRadius: 12, border: user.isUser ? `1px solid ${COLORS.accent}33` : "none" }}>
                  <div style={{ width: 32, textAlign: "center", fontWeight: 700, color: user.rank <= 3 ? COLORS.gold : COLORS.textMuted, fontSize: user.rank <= 3 ? 18 : 14 }}>
                    {user.rank <= 3 ? ["🥇","🥈","🥉"][user.rank-1] : user.rank}
                  </div>
                  <div style={{ width: 40, height: 40, borderRadius: 13, background: user.isUser ? COLORS.accent : COLORS.surfaceLight, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14, border: user.isUser ? `2px solid ${COLORS.accent}` : `1px solid ${COLORS.border}` }}>{user.avatar}</div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 15, fontWeight: user.isUser ? 700 : 500, margin: "0 0 3px", color: user.isUser ? COLORS.accentLight : COLORS.text }}>{user.name}{user.isUser ? " (Você)" : ""}</p>
                    <XPBar current={user.xp} max={5000} color={user.isUser ? COLORS.accent : COLORS.textFaint} />
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontSize: 15, fontWeight: 700, color: COLORS.gold, margin: 0 }}>{user.xp.toLocaleString()}</p>
                    <p style={{ fontSize: 11, color: COLORS.textMuted, margin: 0 }}>XP</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <BottomNav />
        </div>
      );

      // LESSON
      if (screen === "lesson") {
        const q = lessonQuestions[lessonStep];
        return (
          <div style={{ ...S.container, display: "flex", flexDirection: "column" }}>
            <div style={{ ...S.header, display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: COLORS.text, fontSize: 22, cursor: "pointer", padding: 0 }}>✕</button>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontSize: 12, color: COLORS.textMuted }}>
                  <span>Questão {lessonStep+1} de {lessonQuestions.length}</span>
                  <span style={{ color: COLORS.gold, fontWeight: 600 }}>+75 XP</span>
                </div>
                <div style={{ height: 6, borderRadius: 10, background: COLORS.border, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${((lessonStep+1)/lessonQuestions.length)*100}%`, background: COLORS.accent, borderRadius: 10, transition: "width 0.5s" }} />
                </div>
              </div>
              <span style={{ fontSize: 14, color: COLORS.coral, fontWeight: 700 }}>❤️❤️❤️</span>
            </div>
            <div style={{ ...S.scroll, flex: 1 }}>
              <div style={{ background: COLORS.surface, borderRadius: 16, padding: 16, border: `1px solid ${COLORS.border}`, marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 14, background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.blue})`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 22 }}>🤖</div>
                <p style={{ fontSize: 16, lineHeight: 1.6, margin: 0 }}>{q.question}</p>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {q.options.map((opt, i) => {
                  let border = `1px solid ${COLORS.border}`, bg = COLORS.surface, color = COLORS.text;
                  if (showResult) {
                    if (i === q.correct) { border = `2px solid ${COLORS.green}`; bg = COLORS.green + "15"; color = COLORS.green; }
                    else if (i === selectedAnswer) { border = `2px solid ${COLORS.coral}`; bg = COLORS.coral + "15"; color = COLORS.coral; }
                  } else if (i === selectedAnswer) { border = `2px solid ${COLORS.accent}`; bg = COLORS.accent + "15"; }
                  return (
                    <button key={i} onClick={() => !showResult && setSelectedAnswer(i)} style={{ border, background: bg, color, borderRadius: 16, padding: "16px 20px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", transition: "all 0.2s", width: "100%" }}>
                      <span style={{ width: 32, height: 32, borderRadius: 10, background: COLORS.surfaceLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>{["A","B","C","D"][i]}</span>
                      <span style={{ fontSize: 15, fontWeight: 500, textAlign: "left" }}>{opt}</span>
                      {showResult && i === q.correct && <span style={{ marginLeft: "auto" }}>✅</span>}
                      {showResult && i === selectedAnswer && i !== q.correct && <span style={{ marginLeft: "auto" }}>❌</span>}
                    </button>
                  );
                })}
              </div>
              {showResult && (
                <div style={{ marginTop: 16, background: selectedAnswer === q.correct ? COLORS.green + "15" : COLORS.coral + "15", borderRadius: 16, padding: 16, border: `1px solid ${selectedAnswer === q.correct ? COLORS.green : COLORS.coral}44` }}>
                  <p style={{ fontWeight: 700, color: selectedAnswer === q.correct ? COLORS.green : COLORS.coral, margin: "0 0 6px" }}>{selectedAnswer === q.correct ? "✨ Perfeito!" : "💡 Não foi dessa vez!"}</p>
                  <p style={{ fontSize: 14, color: COLORS.text, margin: 0, lineHeight: 1.6 }}>{q.explanation}</p>
                </div>
              )}
            </div>
            <div style={{ padding: "12px 20px 30px", background: COLORS.bg, borderTop: `1px solid ${COLORS.border}` }}>
              {!showResult ? (
                <button disabled={selectedAnswer === null} onClick={() => setShowResult(true)} style={{ width: "100%", padding: 16, borderRadius: 16, border: "none", fontSize: 16, fontWeight: 700, cursor: selectedAnswer === null ? "not-allowed" : "pointer", background: COLORS.accent, color: "#fff", opacity: selectedAnswer === null ? 0.4 : 1 }}>Confirmar resposta</button>
              ) : (
                <button onClick={() => {
                  if (lessonStep < lessonQuestions.length - 1) { setLessonStep(s => s+1); setSelectedAnswer(null); setShowResult(false); }
                  else { setXp(x => x+75); setScreen("home"); setLessonStep(0); setSelectedAnswer(null); setShowResult(false); }
                }} style={{ width: "100%", padding: 16, borderRadius: 16, border: "none", fontSize: 16, fontWeight: 700, cursor: "pointer", background: COLORS.accent, color: "#fff" }}>
                  {lessonStep < lessonQuestions.length - 1 ? "Próxima questão →" : "🎉 Completar lição (+75 XP)"}
                </button>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FluentAI />);
  </script>
</body>
</html>
